<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หมอดู — Home Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-font-smoothing: antialiased;
}

/* ── PAGE ── */
body {
  min-height: 100vh;
  background: #050403;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  font-family: 'Sarabun', 'Inter', sans-serif;
}

.page-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.14);
  margin-bottom: 22px;
}

/* ── PHONE FRAME ── */
.phone {
  width: 390px;
  height: 844px;
  border-radius: 52px;
  border: 10px solid #1a1815;
  overflow: hidden;
  position: relative;
  background: #0b0908;
  box-shadow:
    0 0 0 1px rgba(255,248,230,0.05),
    0 60px 160px rgba(0,0,0,0.98),
    inset 0 0 0 1px rgba(255,255,255,0.02);
}

/* Dynamic Island */
.phone::before {
  content: '';
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 34px;
  background: #0b0908;
  border-radius: 18px;
  z-index: 200;
}

/* ── SCREEN ── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  /* Very subtle warm ambient light behind where the orb lives */
  background:
    radial-gradient(ellipse 90% 55% at 50% 42%,
      rgba(215,170,90,0.09) 0%,
      rgba(215,170,90,0.03) 40%,
      transparent 70%
    ),
    #0b0908;
}

/* ── STATUS BAR ── */
.sbar {
  height: 52px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 28px 8px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: rgba(245,238,220,0.35);
  position: relative;
  z-index: 10;
}

/* ── MAIN CONTENT ── */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 30px 46px;
  position: relative;
}

/* App wordmark — very small, top */
.wordmark {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: rgba(245,238,220,0.22);
  align-self: center;
}

/* Spacers */
.sp { flex-shrink: 0; }

/* ── THE ORB ── */
.orb-wrap {
  position: relative;
  width: 240px;
  height: 240px;
  display: flex;
  align-items: center;
  justify-content: center;
  align-self: center;
  flex-shrink: 0;
}

/* Outermost ambient bloom — very large, very faint */
.orb-bloom {
  position: absolute;
  inset: -70px;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(245,210,130,0.11) 0%,
    rgba(245,210,130,0.04) 40%,
    transparent 65%
  );
  animation: bloom 7s ease-in-out infinite;
  pointer-events: none;
}

/* Outer ring — structural, very faint */
.orb-ring-lg {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 1px solid rgba(245,238,220,0.06);
  animation: ring-breathe 7s ease-in-out infinite;
}

/* Inner ring — slightly more visible */
.orb-ring-sm {
  position: absolute;
  width: 152px;
  height: 152px;
  border-radius: 50%;
  border: 1px solid rgba(245,238,220,0.10);
  animation: ring-breathe 7s ease-in-out infinite 0.6s;
}

/* The sphere */
.orb-sphere {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  position: relative;
  background: radial-gradient(circle at 37% 34%,
    rgba(255,255,255,0.97) 0%,
    rgba(252,242,222,0.88) 18%,
    rgba(235,210,168,0.60) 42%,
    rgba(195,160,100,0.25) 68%,
    transparent 90%
  );
  box-shadow:
    0 0 28px rgba(255,230,155,0.42),
    0 0 72px rgba(255,220,130,0.16),
    0 0 130px rgba(255,215,110,0.07),
    inset 0 -6px 18px rgba(120,80,20,0.22);
  animation: sphere-breathe 7s ease-in-out infinite;
}

/* Highlight specular */
.orb-sphere::after {
  content: '';
  position: absolute;
  top: 14%;
  left: 20%;
  width: 28%;
  height: 18%;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  filter: blur(3px);
}

@keyframes bloom {
  0%, 100% { transform: scale(0.96); opacity: 0.7; }
  50%       { transform: scale(1.06); opacity: 1; }
}
@keyframes ring-breathe {
  0%, 100% { transform: scale(1); opacity: 0.55; }
  50%       { transform: scale(1.07); opacity: 1; }
}
@keyframes sphere-breathe {
  0%, 100% {
    transform: scale(1);
    box-shadow: 0 0 28px rgba(255,230,155,0.42), 0 0 72px rgba(255,220,130,0.16), 0 0 130px rgba(255,215,110,0.07), inset 0 -6px 18px rgba(120,80,20,0.22);
  }
  50% {
    transform: scale(1.04);
    box-shadow: 0 0 42px rgba(255,230,155,0.58), 0 0 100px rgba(255,220,130,0.24), 0 0 180px rgba(255,215,110,0.10), inset 0 -6px 18px rgba(120,80,20,0.22);
  }
}

/* Status below orb */
.orb-status {
  margin-top: 22px;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.06em;
  color: rgba(245,238,220,0.3);
  align-self: center;
  flex-shrink: 0;
}

/* ── TAGLINE ── */
.tagline-wrap {
  align-self: stretch;
  text-align: center;
  flex-shrink: 0;
}

.tagline-main {
  font-size: 19px;
  font-weight: 500;
  line-height: 1.45;
  color: rgba(245,238,220,0.82);
  margin-bottom: 9px;
  letter-spacing: 0.01em;
}

.tagline-sub {
  font-size: 13px;
  font-weight: 300;
  line-height: 1.7;
  color: rgba(245,238,220,0.32);
  letter-spacing: 0.01em;
}

/* ── BUTTONS ── */
.btn-wrap {
  align-self: stretch;
  display: flex;
  flex-direction: column;
  gap: 13px;
  flex-shrink: 0;
}

.btn-main {
  display: block;
  width: 100%;
  background: #f0ebe0;
  color: #100e0b;
  border: none;
  border-radius: 16px;
  padding: 18px;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Sarabun', sans-serif;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: background 0.18s, transform 0.12s;
  line-height: 1;
}
.btn-main:hover { background: #fff; transform: translateY(-1px); }
.btn-main:active { transform: translateY(0); }

.btn-free {
  text-align: center;
  font-size: 13px;
  font-weight: 400;
  color: rgba(245,238,220,0.3);
  cursor: pointer;
  letter-spacing: 0.01em;
  padding: 2px 0 0;
  transition: color 0.15s;
}
.btn-free:hover { color: rgba(245,238,220,0.5); }
.btn-free span { color: rgba(210,165,80,0.65); }
</style>
</head>
<body>

<div class="page-label">หมอดู · Home Screen · Pre-login</div>

<div class="phone">
  <div class="screen">

    <!-- Status Bar -->
    <div class="sbar">
      <span>9:41</span>
      <span style="font-size:11px">●●● 5G ▮</span>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Wordmark -->
      <div class="wordmark">หมอดู</div>

      <!-- Space above orb -->
      <div class="sp" style="height:50px"></div>

      <!-- The Orb -->
      <div class="orb-wrap">
        <div class="orb-bloom"></div>
        <div class="orb-ring-lg"></div>
        <div class="orb-ring-sm"></div>
        <div class="orb-sphere"></div>
      </div>

      <!-- Orb status -->
      <div class="orb-status">พร้อมรับฟัง</div>

      <!-- Flexible middle space -->
      <div class="sp" style="flex:1; min-height:28px"></div>

      <!-- Tagline -->
      <div class="tagline-wrap">
        <div class="tagline-main">ที่ปรึกษาส่วนตัว<br>ด้านดวงชะตาของคุณ</div>
        <div class="tagline-sub">พร้อมช่วยทุกการตัดสินใจ<br>ตลอด 24 ชั่วโมง</div>
      </div>

      <!-- Space above buttons -->
      <div class="sp" style="height:34px"></div>

      <!-- CTAs -->
      <div class="btn-wrap">
        <button class="btn-main">เริ่มต้นใช้งาน</button>
        <div class="btn-free">หรือ ทดลอง<span>เครื่องมือฟรี</span>ก่อน →</div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
